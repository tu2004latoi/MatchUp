<!DOCTYPE html>
<html>
<head>
    <title>Real-time Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .chat-container { max-width: 800px; margin: 0 auto; }
        .messages { border: 1px solid #ddd; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .message.own { background: #dcf8c6; margin-left: 20%; }
        .message.other { background: #fff; margin-right: 20%; }
        .message-header { font-weight: bold; color: #333; font-size: 0.9em; }
        .message-content { margin: 5px 0; }
        .message-time { font-size: 0.8em; color: #666; }
        .input-area { display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .input-area button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .input-area button:hover { background: #0056b3; }
        .controls { margin-bottom: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; }
        .status { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .status.connected { background: #d4edda; color: #155724; }
        .status.disconnected { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>Real-time Chat Room</h1>
        
        <div class="controls">
            <div>
                <label>Room ID: </label>
                <input type="number" id="roomId" value="1">
                <label>Sender ID: </label>
                <input type="number" id="senderId" value="1">
                <button onclick="connect()">Connect</button>
                <button onclick="disconnect()">Disconnect</button>
            </div>
            <div class="status" id="status">Status: Disconnected</div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let stompClient = null;
        let roomId = null;
        let senderId = null;

        function updateStatus(message, isConnected) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = 'Status: ' + message;
            statusDiv.className = 'status ' + (isConnected ? 'connected' : 'disconnected');
        }

        function connect() {
            roomId = document.getElementById('roomId').value;
            senderId = document.getElementById('senderId').value;
            
            const socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);
                updateStatus('Connected to WebSocket', true);
                
                // Subscribe to room-specific messages
                stompClient.subscribe('/topic/room/' + roomId, function (message) {
                    const chatMessage = JSON.parse(message.body);
                    showMessage(chatMessage);
                });
            }, function (error) {
                console.error('WebSocket connection error:', error);
                updateStatus('Connection failed', false);
            });
        }

        function disconnect() {
            if (stompClient !== null) {
                stompClient.disconnect();
            }
            updateStatus('Disconnected', false);
            console.log("Disconnected");
        }

        function showMessage(message) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            const isOwn = message.sender.id == senderId;
            
            messageElement.className = 'message ' + (isOwn ? 'own' : 'other');
            messageElement.innerHTML = `
                <div class="message-header">${message.sender.username || 'User ' + message.sender.id}</div>
                <div class="message-content">${message.content}</div>
                <div class="message-time">${new Date(message.createdAt).toLocaleString()}</div>
            `;
            
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const content = messageInput.value.trim();
            
            if (content && stompClient && stompClient.connected) {
                const message = {
                    content: content,
                    senderId: parseInt(senderId),
                    roomId: parseInt(roomId)
                };
                
                // Send via REST API (this will also broadcast via WebSocket)
                fetch('http://localhost:8080/api/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(message)
                })
                .then(response => response.json())
                .then(savedMessage => {
                    console.log('Message sent:', savedMessage);
                    messageInput.value = '';
                })
                .catch(error => console.error('Error sending message:', error));
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Load existing messages when connecting
        function loadExistingMessages() {
            fetch(`http://localhost:8080/api/v1/messages?roomId=${roomId}`)
                .then(response => response.json())
                .then(messages => {
                    const messagesDiv = document.getElementById('messages');
                    messagesDiv.innerHTML = '';
                    messages.forEach(showMessage);
                })
                .catch(error => console.error('Error loading messages:', error));
        }

        // Override connect to also load existing messages
        const originalConnect = connect;
        connect = function() {
            originalConnect();
            loadExistingMessages();
        };
    </script>
</body>
</html>
